        exerciseTemplateUid:
          type: string
          description: Exercise template UID (e.g. sprint_10m, cod_15_5)
        lastTestDate:
          format: date-time
          type: string
          description: >-
            Most recent attempt timestamp across all metrics for this exercise
            in the result set
        playerResults:
          description: >-
            Per-player metric results: one entry per player matching the query,
            each with metrics array (one per requested metric)
          type: array
          items:
            $ref: '#/components/schemas/MetricsPlayerResultDto'
        groupResults:
          description: >-
            Group results: aggregated metrics across all players that match the
            query for this exercise. "Group" means the set of all players in the
            filter (e.g. club, teamIds, playerIds). One entry per requested
            metric; each has averageValues (e.g. average of each player's total
            and last-5 averages) and totalAttempts (number of players with that
            metric). bestValue, currentValue, previousValue, trend,
            percentageChange and ts are not computed (null/zero/stable).
          type: array
          items:
            $ref: '#/components/schemas/MetricsGroupResultDto'
      required:
        - exerciseId
        - exerciseTemplateUid
        - lastTestDate
        - playerResults
        - groupResults
    MetricsResponseDto:
      type: object
      properties:
